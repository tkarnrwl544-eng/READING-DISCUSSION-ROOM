<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꿈담터 도서관 책 이야기 방</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #F5F4F0; min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Firebase 초기화 ──
    const firebaseConfig = {
      apiKey: "AIzaSyBU5YVuKOylWvWwm8iu2rp2WEl0ecDcEDI",
      authDomain: "reading-disccusion-room.firebaseapp.com",
      projectId: "reading-disccusion-room",
      storageBucket: "reading-disccusion-room.firebasestorage.app",
      messagingSenderId: "657228230496",
      appId: "1:657228230496:web:b4db55795b7b70e6e23805"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const qRef = db.collection('questions');

    // ── 상수 ──
    const PIN = "7510"; // ← 학생 비밀번호
    const ADMIN_PIN = "1234"; // ← 선생님(관리자) 비밀번호 — 변경 가능

    const GRADE_COLOR = {
      "1": "#FF6B6B", "2": "#FF9F43", "3": "#48DBAB",
      "4": "#54A0FF", "5": "#A29BFE", "6": "#FD79A8",
    };
    const PALETTES = [
      { bg: "#FFF3E0", border: "#FF9800", tag: "#E65100" },
      { bg: "#E8F5E9", border: "#4CAF50", tag: "#1B5E20" },
      { bg: "#E3F2FD", border: "#2196F3", tag: "#0D47A1" },
      { bg: "#FCE4EC", border: "#E91E63", tag: "#880E4F" },
      { bg: "#F3E5F5", border: "#9C27B0", tag: "#4A148C" },
      { bg: "#E0F7FA", border: "#00BCD4", tag: "#006064" },
      { bg: "#FFF8E1", border: "#FFC107", tag: "#FF6F00" },
    ];
    const getPal = (title) => {
      let h = 0;
      for (let c of title) h = (h * 31 + c.charCodeAt(0)) % PALETTES.length;
      return PALETTES[h];
    };

    const ISt = {
      width:"100%", padding:"10px 14px", fontSize:14,
      border:"1.5px solid #e0e0e0", borderRadius:10,
      outline:"none", fontFamily:"inherit",
      background:"#fafafa", boxSizing:"border-box",
    };
    const LSt = {
      display:"block", fontSize:11, fontWeight:700,
      color:"#999", marginBottom:5, letterSpacing:"0.06em",
    };
    const pill = (bg, color) => ({
      display:"flex", alignItems:"center", gap:4,
      background:bg, border:"none", borderRadius:16,
      padding:"5px 12px", fontSize:12, color,
      cursor:"pointer", fontWeight:600, fontFamily:"inherit",
    });

    function App() {
      const [pin, setPin]         = useState("");
      const [authed, setAuthed]   = useState(false);
      const [pinErr, setPinErr]   = useState(false);
      const [qs, setQs]           = useState([]);
      const [loading, setLoading] = useState(true);
      const [showQF, setShowQF]   = useState(false);
      const [open, setOpen]       = useState({});
      const [showAF, setShowAF]   = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminPin, setAdminPin] = useState("");
      const [adminErr, setAdminErr] = useState(false);
      const [qf, setQf] = useState({ name:"", grade:"3", ban:"1", num:"", book:"", loanDate:"", q:"" });
      const [af, setAf] = useState({ name:"", grade:"3", ban:"1", num:"", loanDate:"", a:"" });

      // 실시간 구독
      useEffect(() => {
        if (!authed) return;
        const unsub = qRef.orderBy('ts','desc').onSnapshot(snap => {
          setQs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
          setLoading(false);
        }, () => setLoading(false));
        return () => unsub();
      }, [authed]);

      const login = () => {
        if (pin === PIN) { setAuthed(true); setPinErr(false); }
        else { setPinErr(true); setPin(""); }
      };

      const postQ = async () => {
        if (!qf.name.trim() || !qf.book.trim() || !qf.q.trim()) return;
        await qRef.add({
          name:qf.name.trim(), grade:qf.grade, ban:qf.ban, num:qf.num.trim(),
          book:qf.book.trim(), loanDate:qf.loanDate, content:qf.q.trim(),
          ts: firebase.firestore.FieldValue.serverTimestamp(),
          date: new Date().toLocaleDateString('ko-KR'),
          likes:0, answers:[],
        });
        setQf({ name:"", grade:"3", ban:"1", num:"", book:"", loanDate:"", q:"" });
        setShowQF(false);
      };

      const postA = async (qId) => {
        if (!af.name.trim() || !af.a.trim()) return;
        await qRef.doc(qId).update({
          answers: firebase.firestore.FieldValue.arrayUnion({
            id: Date.now().toString(),
            name:af.name.trim(), grade:af.grade, ban:af.ban, num:af.num.trim(),
            loanDate:af.loanDate, content:af.a.trim(),
            date: new Date().toLocaleDateString('ko-KR'), likes:0,
          })
        });
        setAf({ name:"", grade:"3", ban:"1", num:"", loanDate:"", a:"" });
        setShowAF(null);
      };

      const likeQ = (qId) =>
        qRef.doc(qId).update({ likes: firebase.firestore.FieldValue.increment(1) });

      const likeA = async (qId, aId) => {
        const doc = await qRef.doc(qId).get();
        const answers = (doc.data().answers||[]).map(a =>
          a.id === aId ? {...a, likes:(a.likes||0)+1} : a
        );
        await qRef.doc(qId).update({ answers });
      };

      const deleteQ = async (qId) => {
        if (!window.confirm("이 질문을 삭제할까요?")) return;
        await qRef.doc(qId).delete();
      };

      const deleteA = async (qId, aId) => {
        if (!window.confirm("이 답변을 삭제할까요?")) return;
        const doc = await qRef.doc(qId).get();
        const answers = (doc.data().answers||[]).filter(a => a.id !== aId);
        await qRef.doc(qId).update({ answers });
      };

      const loginAdmin = () => {
        if (adminPin === ADMIN_PIN) {
          setIsAdmin(true); setShowAdminLogin(false);
          setAdminPin(""); setAdminErr(false);
        } else {
          setAdminErr(true); setAdminPin("");
        }
      };

      const toggle = (id) => setOpen(o => ({...o, [id]:!o[id]}));

      // ── PIN 화면 ──
      if (!authed) return (
        <div style={{
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          background:"linear-gradient(135deg,#5C6BC0,#AB47BC)", padding:20,
        }}>
          <div style={{
            background:"white", borderRadius:24, padding:"44px 40px",
            textAlign:"center", boxShadow:"0 24px 64px rgba(0,0,0,0.22)",
            maxWidth:380, width:"100%",
          }}>
            <div style={{fontSize:52,marginBottom:10}}>📚</div>
            <h1 style={{fontSize:20,fontWeight:900,color:"#222",margin:"0 0 6px"}}>꿈담터 도서관<br/>책 이야기 방</h1>
            <p style={{fontSize:13,color:"#aaa",margin:"0 0 32px"}}>선생님께 받은 비밀번호를 입력해 주세요</p>
            <input type="password" value={pin} placeholder="비밀번호"
              onChange={e=>{setPin(e.target.value);setPinErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&login()}
              style={{...ISt,textAlign:"center",fontSize:22,letterSpacing:"0.3em",
                marginBottom:8,fontFamily:"monospace",
                border:`2px solid ${pinErr?"#EF5350":"#e0e0e0"}`}}
            />
            {pinErr && <p style={{color:"#EF5350",fontSize:12,margin:"0 0 10px"}}>비밀번호가 틀렸어요. 다시 입력해 주세요.</p>}
            <button onClick={login} style={{
              width:"100%",padding:14,marginTop:8,
              background:"linear-gradient(135deg,#5C6BC0,#AB47BC)",
              color:"white",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",
            }}>입장하기 →</button>
            <p style={{fontSize:11,color:"#ccc",marginTop:20}}>🔒 이 공간은 우리 학교 학생들만 사용해요</p>
          </div>
        </div>
      );

      // ── 메인 보드 ──
      return (
        <div style={{minHeight:"100vh",background:"#F5F4F0"}}>

          {/* 헤더 */}
          <div style={{
            background:"linear-gradient(135deg,#5C6BC0,#AB47BC)",
            padding:"18px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
          }}>
            <div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.65)",letterSpacing:"0.12em",marginBottom:3}}>
                📚 도서관 큐레이션 프로젝트
              </div>
              <h1 style={{color:"white",fontSize:18,fontWeight:900,margin:0}}>꿈담터 도서관 책 이야기 방</h1>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {isAdmin && (
                <span style={{
                  background:"#FFD600",color:"#333",borderRadius:12,
                  padding:"4px 10px",fontSize:11,fontWeight:700,
                }}>🔑 관리자 모드</span>
              )}
              {!isAdmin && (
                <button onClick={()=>setShowAdminLogin(true)} style={{
                  background:"rgba(255,255,255,0.15)",color:"white",border:"1px solid rgba(255,255,255,0.3)",
                  borderRadius:16,padding:"5px 12px",fontSize:11,cursor:"pointer",
                }}>관리자</button>
              )}
              {isAdmin && (
                <button onClick={()=>setIsAdmin(false)} style={{
                  background:"rgba(255,255,255,0.15)",color:"white",border:"1px solid rgba(255,255,255,0.3)",
                  borderRadius:16,padding:"5px 12px",fontSize:11,cursor:"pointer",
                }}>나가기</button>
              )}
              <button onClick={()=>setShowQF(true)} style={{
                background:"white",color:"#5C6BC0",border:"none",
                borderRadius:22,padding:"9px 18px",fontSize:13,
                fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,0,0,0.15)",
              }}>✏️ 질문 올리기</button>
            </div>
          </div>

          {/* 안내 배너 */}
          <div style={{
            background:"linear-gradient(135deg,#EDE7F6,#E3F2FD)",
            borderBottom:"1px solid #D1C4E9",
            padding:"20px 24px",
          }}>
            <p style={{
              fontSize:15,fontWeight:700,color:"#4527A0",
              marginBottom:14,lineHeight:1.6,
            }}>
              📖 책을 읽고 궁금했던 점을 써보세요!<br/>
              <span style={{fontSize:13,fontWeight:400,color:"#5C6BC0"}}>
                친구들이 쓴 궁금증에 답변도 달아보고, 서로의 생각을 나눠봐요.
              </span>
            </p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[
                { icon:"📖", step:"1", title:"책 빌려서 읽기", desc:"도서관에서 책을 빌려 읽고, 궁금했던 점을 질문으로 써요" },
                { icon:"💬", step:"2", title:"친구 질문에 답변하기", desc:"친구들의 질문을 보고, 그 책을 대출해서 읽은 뒤 내 생각을 댓글로 달아요" },
                { icon:"🎁", step:"3", title:"상품 받기", desc:"질문·댓글과 대출 기록을 도서관 사서 선생님께 인증하면 소정의 상품을 드려요!" },
              ].map(({icon,step,title,desc})=>(
                <div key={step} style={{
                  flex:"1 1 200px",background:"white",borderRadius:12,
                  padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",
                  borderTop:`3px solid #7C4DFF`,
                }}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                    <span style={{
                      background:"#7C4DFF",color:"white",borderRadius:"50%",
                      width:20,height:20,display:"flex",alignItems:"center",
                      justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0,
                    }}>{step}</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#333"}}>{icon} {title}</span>
                  </div>
                  <p style={{fontSize:12,color:"#666",lineHeight:1.55,margin:0}}>{desc}</p>
                </div>
              ))}
            </div>
          </div>

          {/* 안내바 */}
          <div style={{
            background:"white",borderBottom:"1px solid #eee",
            padding:"10px 24px",fontSize:12,color:"#999",
            display:"flex",justifyContent:"space-between",alignItems:"center",
          }}>
            <span>질문을 클릭하면 답변을 볼 수 있어요 💬</span>
            <span style={{fontWeight:700,color:"#777"}}>질문 {qs.length}개</span>
          </div>

          {/* 목록 */}
          <div style={{maxWidth:860,margin:"0 auto",padding:"24px 16px"}}>
            {loading && <div style={{textAlign:"center",color:"#bbb",padding:60,fontSize:15}}>불러오는 중...</div>}
            {!loading && qs.length===0 && (
              <div style={{textAlign:"center",padding:"70px 20px",color:"#ccc"}}>
                <div style={{fontSize:52,marginBottom:12}}>🌱</div>
                <p style={{fontSize:15}}>아직 질문이 없어요.<br/>첫 번째 질문을 올려보세요!</p>
              </div>
            )}

            {qs.map(q => {
              const pal = getPal(q.book||"");
              const gc  = GRADE_COLOR[q.grade]||"#888";
              const isOpen = open[q.id];
              return (
                <div key={q.id} style={{marginBottom:14}}>

                  {/* 질문 카드 */}
                  <div style={{
                    background:"white",borderRadius:16,
                    borderLeft:`5px solid ${pal.border}`,
                    boxShadow:"0 2px 14px rgba(0,0,0,0.07)",overflow:"hidden",
                  }}>
                    <div style={{
                      background:pal.bg,padding:"8px 18px",
                      display:"flex",alignItems:"center",gap:6,
                      borderBottom:`1px solid ${pal.border}33`,
                    }}>
                      <span style={{fontSize:13}}>📖</span>
                      <span style={{fontSize:12,fontWeight:800,color:pal.tag}}>{q.book}</span>
                    </div>
                    <div style={{padding:"14px 18px 12px"}}>
                      <p onClick={()=>toggle(q.id)} style={{
                        fontSize:15,color:"#1a1a1a",lineHeight:1.65,margin:"0 0 12px",cursor:"pointer",
                      }}>{q.content}</p>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                          <span style={{
                            background:gc,color:"white",borderRadius:8,
                            padding:"2px 7px",fontSize:11,fontWeight:700,
                          }}>{q.grade}학년 {q.ban}반</span>
                          <span style={{fontSize:11,color:"#aaa"}}>{q.num}번</span>
                          <span style={{fontSize:13,fontWeight:700,color:"#444"}}>{q.name}</span>
                          {q.loanDate && (
                            <span style={{
                              fontSize:10,color:"#2e7d32",background:"#F1F8E9",
                              border:"1px solid #C8E6C9",borderRadius:6,
                              padding:"1px 6px",fontWeight:600,
                            }}>📅 대출 {q.loanDate}</span>
                          )}
                        </div>
                        <div style={{display:"flex",gap:7}}>
                          <button onClick={()=>likeQ(q.id)} style={pill("#FFF0F0","#E91E63")}>❤️ {q.likes||0}</button>
                          <button onClick={()=>toggle(q.id)} style={pill("#EEF2FF","#5C6BC0")}>💬 {(q.answers||[]).length}</button>
                          {isAdmin && (
                            <button onClick={()=>deleteQ(q.id)} style={pill("#FFF0F0","#c62828")}>🗑️ 삭제</button>
                          )}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 답변 트리 */}
                  {isOpen && (
                    <div style={{marginLeft:28,marginTop:4}}>
                      <div style={{position:"relative"}}>
                        <div style={{position:"absolute",left:-16,top:0,bottom:0,width:2,background:`${pal.border}55`}}/>
                        {(q.answers||[]).map(a=>(
                          <div key={a.id} style={{position:"relative",marginBottom:8}}>
                            <div style={{position:"absolute",left:-16,top:22,width:14,height:2,background:`${pal.border}55`}}/>
                            <div style={{background:"#FAFAF8",borderRadius:12,border:"1px solid #EBEBEB",padding:"12px 14px"}}>
                              <p style={{fontSize:14,color:"#333",lineHeight:1.65,margin:"0 0 8px"}}>{a.content}</p>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                                  <span style={{
                                    background:GRADE_COLOR[a.grade]||"#888",color:"white",
                                    borderRadius:7,padding:"1px 6px",fontSize:10,fontWeight:700,
                                  }}>{a.grade}학년 {a.ban}반</span>
                                  <span style={{fontSize:10,color:"#aaa"}}>{a.num}번</span>
                                  <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{a.name}</span>
                                  {a.loanDate && (
                                    <span style={{
                                      fontSize:10,color:"#2e7d32",background:"#F1F8E9",
                                      border:"1px solid #C8E6C9",borderRadius:6,
                                      padding:"1px 5px",fontWeight:600,
                                    }}>📅 대출 {a.loanDate}</span>
                                  )}
                                </div>
                                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                  <button onClick={()=>likeA(q.id,a.id)} style={pill("#FFF0F0","#E91E63")}>❤️ {a.likes||0}</button>
                                  {isAdmin && (
                                    <button onClick={()=>deleteA(q.id,a.id)} style={pill("#FFF0F0","#c62828")}>🗑️</button>
                                  )}
                                </div>
                              </div>
                            </div>
                          </div>
                        ))}

                        {/* 답변 폼 */}
                        {showAF!==q.id ? (
                          <button onClick={()=>setShowAF(q.id)} style={{
                            width:"100%",padding:"10px 14px",marginTop:4,
                            background:"white",border:"1.5px dashed #ddd",
                            borderRadius:10,fontSize:13,color:"#aaa",cursor:"pointer",textAlign:"left",
                          }}>+ 답변 달기</button>
                        ) : (
                          <div style={{background:"white",borderRadius:12,padding:"14px",border:`1.5px solid ${pal.border}55`,marginTop:4}}>
                            <div style={{display:"flex",gap:8,marginBottom:8}}>
                              <select value={af.grade} onChange={e=>setAf(f=>({...f,grade:e.target.value}))}
                                style={{...ISt,flex:1,padding:"8px 10px",fontSize:13}}>
                                {["1","2","3","4","5","6"].map(g=><option key={g} value={g}>{g}학년</option>)}
                              </select>
                              <select value={af.ban} onChange={e=>setAf(f=>({...f,ban:e.target.value}))}
                                style={{...ISt,flex:1,padding:"8px 10px",fontSize:13}}>
                                {Array.from({length:6},(_,i)=>String(i+1)).map(b=><option key={b} value={b}>{b}반</option>)}
                              </select>
                              <input type="number" min="1" max="40" value={af.num} placeholder="번호"
                                onChange={e=>setAf(f=>({...f,num:e.target.value}))}
                                style={{...ISt,flex:1,padding:"8px 10px",fontSize:13}}/>
                              <input value={af.name} placeholder="이름"
                                onChange={e=>setAf(f=>({...f,name:e.target.value}))}
                                style={{...ISt,flex:2,padding:"8px 12px",fontSize:13}}/>
                            </div>
                            <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                              <label style={{...LSt,margin:0,whiteSpace:"nowrap"}}>📅 대출일</label>
                              <input type="date" value={af.loanDate}
                                onChange={e=>setAf(f=>({...f,loanDate:e.target.value}))}
                                style={{...ISt,flex:1,padding:"8px 10px",fontSize:13}}/>
                            </div>
                            <textarea value={af.a} onChange={e=>setAf(f=>({...f,a:e.target.value}))}
                              placeholder="답변을 적어주세요" rows={3}
                              style={{...ISt,fontSize:13,resize:"vertical",marginBottom:10}}/>
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={()=>setShowAF(null)} style={{
                                flex:1,padding:"9px",border:"1.5px solid #ddd",
                                borderRadius:9,background:"white",color:"#888",fontSize:13,cursor:"pointer",
                              }}>취소</button>
                              <button onClick={()=>postA(q.id)} style={{
                                flex:2,padding:"9px",border:"none",borderRadius:9,
                                background:`linear-gradient(135deg,${pal.border},${pal.tag})`,
                                color:"white",fontSize:13,fontWeight:700,cursor:"pointer",
                              }}>답변 올리기</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 관리자 로그인 모달 */}
          {showAdminLogin && (
            <div style={{
              position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",
              display:"flex",alignItems:"center",justifyContent:"center",
              zIndex:300,padding:20,
            }}>
              <div style={{
                background:"white",borderRadius:20,padding:"28px 26px",
                width:"100%",maxWidth:340,
                boxShadow:"0 24px 60px rgba(0,0,0,0.25)",textAlign:"center",
              }}>
                <div style={{fontSize:36,marginBottom:10}}>🔑</div>
                <h2 style={{fontSize:16,fontWeight:900,color:"#222",margin:"0 0 6px"}}>관리자 로그인</h2>
                <p style={{fontSize:12,color:"#aaa",margin:"0 0 20px"}}>선생님 전용 비밀번호를 입력해 주세요</p>
                <input type="password" value={adminPin} placeholder="관리자 비밀번호"
                  onChange={e=>{setAdminPin(e.target.value);setAdminErr(false);}}
                  onKeyDown={e=>e.key==="Enter"&&loginAdmin()}
                  style={{...ISt,textAlign:"center",fontSize:18,letterSpacing:"0.2em",
                    marginBottom:8,fontFamily:"monospace",
                    border:`2px solid ${adminErr?"#EF5350":"#e0e0e0"}`}}
                />
                {adminErr && <p style={{color:"#EF5350",fontSize:12,margin:"0 0 8px"}}>비밀번호가 틀렸어요.</p>}
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <button onClick={()=>{setShowAdminLogin(false);setAdminPin("");setAdminErr(false);}} style={{
                    flex:1,padding:"11px",border:"1.5px solid #ddd",
                    borderRadius:10,background:"white",color:"#888",fontSize:13,cursor:"pointer",
                  }}>취소</button>
                  <button onClick={loginAdmin} style={{
                    flex:2,padding:"11px",border:"none",borderRadius:10,
                    background:"linear-gradient(135deg,#5C6BC0,#AB47BC)",
                    color:"white",fontSize:13,fontWeight:700,cursor:"pointer",
                  }}>로그인</button>
                </div>
              </div>
            </div>
          )}

          {/* 질문 모달 */}
          {showQF && (
            <div style={{
              position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",
              display:"flex",alignItems:"center",justifyContent:"center",
              zIndex:200,padding:20,
            }}>
              <div style={{
                background:"white",borderRadius:20,padding:"28px 26px",
                width:"100%",maxWidth:480,
                boxShadow:"0 24px 60px rgba(0,0,0,0.25)",
                maxHeight:"90vh",overflowY:"auto",
              }}>
                <h2 style={{fontSize:18,fontWeight:900,color:"#222",margin:"0 0 20px"}}>✏️ 질문 올리기</h2>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  <div style={{flex:1}}>
                    <label style={LSt}>학년</label>
                    <select value={qf.grade} onChange={e=>setQf(f=>({...f,grade:e.target.value}))} style={ISt}>
                      {["1","2","3","4","5","6"].map(g=><option key={g} value={g}>{g}학년</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <label style={LSt}>반</label>
                    <select value={qf.ban} onChange={e=>setQf(f=>({...f,ban:e.target.value}))} style={ISt}>
                      {Array.from({length:6},(_,i)=>String(i+1)).map(b=><option key={b} value={b}>{b}반</option>)}
                    </select>
                  </div>
                  <div style={{flex:1}}>
                    <label style={LSt}>번호</label>
                    <input type="number" min="1" max="40" value={qf.num} placeholder="번"
                      onChange={e=>setQf(f=>({...f,num:e.target.value}))} style={ISt}/>
                  </div>
                  <div style={{flex:2}}>
                    <label style={LSt}>이름</label>
                    <input value={qf.name} placeholder="이름"
                      onChange={e=>setQf(f=>({...f,name:e.target.value}))} style={ISt}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginBottom:14}}>
                  <div style={{flex:1}}>
                    <label style={LSt}>책 제목</label>
                    <input value={qf.book} placeholder="책 제목을 입력해 주세요"
                      onChange={e=>setQf(f=>({...f,book:e.target.value}))} style={ISt}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={LSt}>📅 대출일</label>
                    <input type="date" value={qf.loanDate}
                      onChange={e=>setQf(f=>({...f,loanDate:e.target.value}))} style={ISt}/>
                  </div>
                </div>
                <div style={{marginBottom:22}}>
                  <label style={LSt}>궁금한 점</label>
                  <textarea value={qf.q} onChange={e=>setQf(f=>({...f,q:e.target.value}))}
                    placeholder="책을 읽고 궁금했던 점이나 더 이야기하고 싶은 것을 적어주세요"
                    rows={4} style={{...ISt,resize:"vertical"}}/>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setShowQF(false)} style={{
                    flex:1,padding:"12px",border:"1.5px solid #ddd",
                    borderRadius:10,background:"white",color:"#888",fontSize:14,cursor:"pointer",
                  }}>취소</button>
                  <button onClick={postQ} style={{
                    flex:2,padding:"12px",border:"none",borderRadius:10,
                    background:"linear-gradient(135deg,#5C6BC0,#AB47BC)",
                    color:"white",fontSize:14,fontWeight:700,cursor:"pointer",
                  }}>질문 올리기 →</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
